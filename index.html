<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiCode Bot Builder</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161e;
            --accent: #7aa2f7;
            --text: #c0caf5;
            --bot-color: #7aa2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- ЭКРАН КАСТОМИЗАЦИИ --- */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }

        .preview-bot {
            width: 150px; height: 150px; background: var(--bot-color);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--bot-color); margin-bottom: 30px; transition: 0.3s;
        }

        .setup-controls { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; }
        .color-picker { display: flex; gap: 10px; margin: 20px 0; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС --- */
        main { display: grid; grid-template-columns: 350px 1fr; height: 100vh; opacity: 0; transition: 1s; }
        .sidebar { background: var(--panel); padding: 20px; border-right: 1px solid #292e42; display: flex; flex-direction: column; }
        .editor-area { display: flex; flex-direction: column; }
        
        #editor { 
            flex-grow: 1; background: #1a1b26; color: #a9b1d6; padding: 20px; 
            border: none; font-size: 18px; outline: none; resize: none;
        }

        .terminal { height: 200px; background: #000; padding: 15px; border-top: 2px solid var(--accent); color: #0f0; font-size: 14px; overflow-y: auto; }

        /* --- РОБОТ В ИГРЕ --- */
        .game-bot {
            position: fixed; bottom: 20px; right: 20px; display: flex; align-items: flex-end; gap: 15px;
        }
        .bubble { 
            background: white; color: black; padding: 15px; border-radius: 15px 15px 0 15px; 
            max-width: 250px; font-size: 14px; margin-bottom: 10px; 
        }
        .mini-bot { width: 60px; height: 60px; border-radius: 12px; animation: float 3s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { background: var(--accent); color: #1a1b26; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { filter: brightness(1.2); }
        .lang-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #292e42; color: var(--accent); }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>Создай своего помощника</h1>
    <div class="preview-bot" id="p-bot">
        <div id="p-eyes" style="display: flex; gap: 15px;">
            <div style="width:15px; height:15px; background:black; border-radius:50%"></div>
            <div style="width:15px; height:15px; background:black; border-radius:50%"></div>
        </div>
    </div>
    <div class="setup-controls">
        <p>Выбери цвет корпуса:</p>
        <div class="color-picker">
            <div class="dot" style="background:#7aa2f7" onclick="setColor('#7aa2f7')"></div>
            <div class="dot" style="background:#bb9af7" onclick="setColor('#bb9af7')"></div>
            <div class="dot" style="background:#7dcfff" onclick="setColor('#7dcfff')"></div>
            <div class="dot" style="background:#f7768e" onclick="setColor('#f7768e')"></div>
        </div>
        <button class="btn" onclick="startGame()">ГОТОВО, ПОГНАЛИ!</button>
    </div>
</div>

<main id="game-ui">
    <div class="sidebar">
        <div id="level-info">
            <span class="lang-badge" id="curr-lang">PYTHON</span>
            <h2 id="lvl-title" style="margin: 10px 0;">Уровень 1</h2>
            <p id="lvl-desc" style="font-size: 14px; line-height: 1.4; color: #94a3b8;"></p>
        </div>
        <div style="margin-top: auto;">
            <button class="btn" style="width: 100%;" onclick="runCode()">ЗАПУСТИТЬ КОД</button>
        </div>
    </div>

    <div class="editor-area">
        <textarea id="editor" spellcheck="false"></textarea>
        <div class="terminal" id="term-out">System ready...</div>
    </div>
</main>

<div class="game-bot">
    <div style="display: flex; flex-direction: column; align-items: flex-end;">
        <div class="bubble" id="bot-say">Привет! Давай кодить!</div>
    </div>
    <div class="mini-bot" id="m-bot"></div>
</div>

<script>
    const levels = [
        {
            lang: "PYTHON",
            title: "Вывод текста",
            desc: "В Python для вывода используется функция <b>print()</b>. Выведи число 2026.",
            target: /print\(\s*2026\s*\)/,
            start: "# Напиши здесь\n",
            hint: "Напиши: print(2026)"
        },
        {
            lang: "C++",
            title: "База C++",
            desc: "В C++ мы используем <b>cout</b>. Допиши команду, чтобы вывести 'Hi'.",
            target: /cout\s*<<\s*["']Hi["']/,
            start: "#include <iostream>\nusing namespace std;\nint main() {\n  // твой код ниже\n  \n  return 0;\n}",
            hint: "Используй: cout << 'Hi';"
        },
        {
            lang: "JAVASCRIPT",
            title: "Alert!",
            desc: "В JS можно вызвать окно уведомления. Используй <b>alert</b> с любым текстом.",
            target: /alert\(.*\)/,
            start: "// Напиши alert\n",
            hint: "Напиши: alert('Готово');"
        }
    ];

    let currentLvl = 0;
    let botColor = '#7aa2f7';

    function setColor(c) {
        botColor = c;
        document.getElementById('p-bot').style.backgroundColor = c;
        document.getElementById('p-bot').style.boxShadow = `0 0 30px ${c}`;
    }

    function startGame() {
        document.getElementById('setup-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.opacity = '1';
            document.getElementById('m-bot').style.backgroundColor = botColor;
            document.getElementById('m-bot').style.boxShadow = `0 0 20px ${botColor}`;
            loadLevel();
        }, 500);
    }

    function loadLevel() {
        const lvl = levels[currentLvl];
        document.getElementById('curr-lang').innerText = lvl.lang;
        document.getElementById('lvl-title').innerText = lvl.title;
        document.getElementById('lvl-desc').innerHTML = lvl.desc;
        document.getElementById('editor').value = lvl.start;
        document.getElementById('term-out').innerText = `[${lvl.lang} Compiler Ready]...`;
        document.getElementById('bot-say').innerText = "Попробуй выполнить задание!";
    }

    function runCode() {
        const code = document.getElementById('editor').value;
        const lvl = levels[currentLvl];
        const term = document.getElementById('term-out');

        term.innerText += "\n> Проверка кода...";

        if (lvl.target.test(code)) {
            term.innerHTML += `\n<span style="color: #0f0;">[SUCCESS] Код прошел тесты!</span>`;
            document.getElementById('bot-say').innerText = "Круто! Ты справился!";
            
            setTimeout(() => {
                currentLvl++;
                if (currentLvl < levels.length) {
                    loadLevel();
                } else {
                    document.getElementById('bot-say').innerText = "ТЫ ПРОШЕЛ ВСЁ! ГЕНИЙ!";
                }
            }, 1500);
        } else {
            term.innerHTML += `\n<span style="color: #f00;">[ERROR] Ошибка синтаксиса или неверный результат.</span>`;
            document.getElementById('bot-say').innerText = lvl.hint;
        }
    }
</script>

</body>
</html>
