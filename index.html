<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteCode Pro | Интерактивное обучение</title>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --bg: #05070a;
            --panel: rgba(15, 20, 30, 0.8);
            --text: #e2e8f0;
            --success: #00ff88;
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', 'Fira Code', monospace; }

        body {
            background: radial-gradient(circle at top right, #1a1b2e, var(--bg));
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            height: 70px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            z-index: 10;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); text-transform: uppercase; }

        .progress-box { flex-grow: 1; max-width: 500px; margin: 0 40px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; }
        #progress-fill { 
            position: absolute; height: 100%; background: var(--accent); border-radius: 10px; 
            width: 0%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px var(--accent);
        }

        /* --- Main Layout --- */
        main {
            display: grid;
            grid-template-columns: 350px 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 70px);
        }

        .card {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* --- Theory Section --- */
        .theory-content { padding: 25px; overflow-y: auto; flex-grow: 1; }
        .theory-content h2 { font-size: 1.8rem; margin-bottom: 15px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theory-content p { line-height: 1.6; color: #94a3b8; margin-bottom: 20px; }

        /* --- Editor --- */
        #code-editor {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #d1d5db;
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            outline: none;
            caret-color: var(--accent);
        }

        /* --- Preview --- */
        #preview { width: 100%; height: 100%; background: #fff; border: none; }

        /* --- Byte Bot --- */
        .byte-box {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
        }

        .byte-speech {
            background: #fff;
            color: #000;
            padding: 15px 20px;
            border-radius: 20px 20px 0 20px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            pointer-events: all;
        }

        .byte-speech.active { opacity: 1; transform: translateY(0); }

        .byte-avatar {
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 0 30px var(--accent-glow);
            pointer-events: all;
        }

        .byte-eyes { display: flex; gap: 10px; }
        .eye { width: 10px; height: 10px; background: #000; border-radius: 50%; transition: 0.2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- Button --- */
        .check-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            margin: 20px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .check-btn:hover {
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.02);
        }

        .check-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

<header>
    <div class="logo">ByteCode<span style="color:#fff">.dev</span></div>
    <div class="progress-box">
        <div style="margin-bottom: 8px; font-size: 0.7rem; display: flex; justify-content: space-between;">
            <span id="lvl-num">Level 1/3</span>
            <span id="lvl-percent">0% Completed</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <div id="user-info" style="font-size: 0.8rem;">Ready to Compile_</div>
</header>

<main>
    <section class="card">
        <div class="card-header">Instructions // Теория</div>
        <div class="theory-content">
            <h2 id="title">Загрузка системы...</h2>
            <p id="desc">Подождите, Байт настраивает окружение.</p>
        </div>
        <button class="check-btn" onclick="checkAnswer()">Запустить код</button>
    </section>

    <section class="card">
        <div class="card-header">Source Code // Редактор</div>
        <textarea id="code-editor" spellcheck="false" oninput="render()"></textarea>
    </section>

    <section class="card">
        <div class="card-header">Live View // Результат</div>
        <iframe id="preview"></iframe>
    </section>
</main>

<div class="byte-box">
    <div class="byte-speech" id="byte-text">Инициализация...</div>
    <div class="byte-avatar" id="byte-bot">
        <div class="byte-eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>
</div>

<script>
    const levels = [
        {
            title: "Заголовки",
            desc: "Добро пожаловать в систему! Чтобы сайт заговорил, нужен заголовок. Используй тег <b>&lt;h1&gt;</b> и напиши внутри <i>'Hello Byte'</i>.",
            target: /<h1>\s*Hello\s*Byte\s*<\/h1>/i,
            start: "",
            hint: "Бро, просто напиши <h1>Hello Byte</h1>"
        },
        {
            title: "Списки покупок",
            desc: "Отлично! Теперь создадим список. Используй <b>&lt;ul&gt;</b> для списка и <b>&lt;li&gt;</b> для элемента. Напиши в элементе <i>'Chips'</i>.",
            target: /<ul>\s*<li>\s*Chips\s*<\/li>\s*<\/ul>/i,
            start: "<ul>\n  \n</ul>",
            hint: "Помни: li должен быть внутри ul!"
        },
        {
            title: "Гиперссылки",
            desc: "Последний рывок! Давай сделаем ссылку на YouTube. Используй <b>&lt;a&gt;</b> с атрибутом <b>href='https://youtube.com'</b>.",
            target: /<a\s+href=["']https:\/\/youtube\.com["']\s*>.*<\/a>/i,
            start: '<a href="">YouTube</a>',
            hint: "Добавь адрес в кавычки href."
        }
    ];

    let currentLvl = 0;
    const editor = document.getElementById('code-editor');
    const preview = document.getElementById('preview');
    const byteText = document.getElementById('byte-text');

    function speak(msg, isHappy = true) {
        byteText.innerText = msg;
        byteText.classList.remove('active');
        void byteText.offsetWidth; // Триггер анимации
        byteText.classList.add('active');
        
        const eyes = document.querySelectorAll('.eye');
        if (!isHappy) {
            eyes.forEach(e => e.style.background = '#ff4d4d');
            setTimeout(() => eyes.forEach(e => e.style.background = '#000'), 2000);
        }
    }

    function render() {
        const val = editor.value;
        const doc = preview.contentDocument;
        doc.open();
        doc.write(`<style>body{background:#fff;color:#222;font-family:sans-serif;padding:20px;}</style>${val}`);
        doc.close();
    }

    function checkAnswer() {
        const code = editor.value;
        const goal = levels[currentLvl];

        if (goal.target.test(code)) {
            currentLvl++;
            if (currentLvl < levels.length) {
                speak("Бум! Это было четко. Идем дальше!", true);
                setTimeout(loadLevel, 1500);
            } else {
                speak("Ты прошел все тесты! Теперь ты настоящий кодер.", true);
                document.getElementById('progress-fill').style.width = "100%";
            }
        } else {
            speak(goal.hint, false);
        }
    }

    function loadLevel() {
        const lvl = levels[currentLvl];
        document.getElementById('title').innerText = lvl.title;
        document.getElementById('desc').innerHTML = lvl.desc;
        editor.value = lvl.start;
        document.getElementById('lvl-num').innerText = `Level ${currentLvl + 1}/${levels.length}`;
        
        const progress = (currentLvl / levels.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
        document.getElementById('lvl-percent').innerText = Math.round(progress) + "% Completed";
        
        render();
        speak("Новое задание загружено. Погнали!");
    }

    window.onload = loadLevel;
</script>
</body>
</html>
